<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .animated-gradient {
            background: linear-gradient(-45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #667eea 75%, #764ba2 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .pulse-glow {
            animation: pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        
        .shimmer::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        .critical { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .moderate { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .low { background: linear-gradient(135deg, #10b981, #059669); }
        
        .glow-red { box-shadow: 0 0 20px rgba(220, 38, 38, 0.3), 0 0 40px rgba(220, 38, 38, 0.1); }
        .glow-amber { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3), 0 0 40px rgba(245, 158, 11, 0.1); }
        .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3), 0 0 40px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="relative overflow-hidden">
        <div class="absolute inset-0 animated-gradient opacity-20"></div>
        <div class="relative glass-morphism border-b border-white/10 px-8 py-6">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-6">
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-blue-500/20 to-purple-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative p-4 bg-gradient-to-br from-blue-500/10 to-purple-500/10 rounded-2xl border border-blue-400/30 hover-lift">
                            <i data-lucide="shield" class="w-8 h-8 text-blue-400 floating"></i>
                            <div class="absolute -bottom-2 left-1/2 right-1/2 h-1 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full"></div>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-4xl font-black text-white tracking-tight mb-2 shimmer">Emergency Management Dashboard</h1>
                        <p class="text-base text-gray-300 font-light">Real-time monitoring and coordination platform</p>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-green-500/20 to-emerald-500/20 rounded-xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative px-6 py-3 bg-gradient-to-br from-green-500/10 to-emerald-500/10 rounded-xl border border-green-400/30 hover-lift">
                            <div class="flex items-center space-x-3">
                                <div class="relative">
                                    <i data-lucide="activity" class="w-5 h-5 text-green-400"></i>
                                    <div class="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full pulse-glow glow-green"></div>
                                </div>
                                <span class="text-sm font-semibold text-green-400">System Active</span>
                            </div>
                            <div class="absolute -bottom-2 left-1/2 right-1/2 h-1 bg-gradient-to-r from-green-400 to-emerald-400 rounded-full glow-green"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-8">
        <div class="max-w-7xl mx-auto">
            <!-- Metrics Overview -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-500/20 to-purple-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                        <div class="flex items-center space-x-4">
                            <div class="relative">
                                <div class="absolute -inset-1 bg-gradient-to-r from-blue-500/30 to-purple-500/30 rounded-xl blur-lg"></div>
                                <div class="relative p-3 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl border border-blue-400/30 hover-lift">
                                    <i data-lucide="activity" class="w-6 h-6 text-blue-400 floating"></i>
                                    <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full"></div>
                                </div>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400 font-bold tracking-wider">TOTAL EVENTS</p>
                                <p class="text-3xl font-black text-blue-400" id="totalEvents">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-red-500/20 to-orange-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                        <div class="flex items-center space-x-4">
                            <div class="relative">
                                <div class="absolute -inset-1 bg-gradient-to-r from-red-500/30 to-orange-500/30 rounded-xl blur-lg"></div>
                                <div class="relative p-3 bg-gradient-to-br from-red-500/20 to-orange-500/20 rounded-xl border border-red-400/30 hover-lift">
                                    <i data-lucide="alert-triangle" class="w-6 h-6 text-red-400 floating"></i>
                                    <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-red-400 to-orange-400 rounded-full"></div>
                                </div>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400 font-bold tracking-wider">ACTIVE</p>
                                <p class="text-3xl font-black text-red-400" id="activeEvents">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-green-500/20 to-emerald-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                        <div class="flex items-center space-x-4">
                            <div class="relative">
                                <div class="absolute -inset-1 bg-gradient-to-r from-green-500/30 to-emerald-500/30 rounded-xl blur-lg"></div>
                                <div class="relative p-3 bg-gradient-to-br from-green-500/20 to-emerald-500/20 rounded-xl border border-green-400/30 hover-lift">
                                    <i data-lucide="check-circle" class="w-6 h-6 text-green-400 floating"></i>
                                    <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-green-400 to-emerald-400 rounded-full"></div>
                                </div>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400 font-bold tracking-wider">RESOLVED</p>
                                <p class="text-3xl font-black text-green-400" id="resolvedEvents">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-purple-500/20 to-pink-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                        <div class="flex items-center space-x-4">
                            <div class="relative">
                                <div class="absolute -inset-1 bg-gradient-to-r from-purple-500/30 to-pink-500/30 rounded-xl blur-lg"></div>
                                <div class="relative p-3 bg-gradient-to-br from-purple-500/20 to-pink-500/20 rounded-xl border border-purple-400/30 hover-lift">
                                    <i data-lucide="trending-up" class="w-6 h-6 text-purple-400 floating"></i>
                                    <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-purple-400 to-pink-400 rounded-full"></div>
                                </div>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400 font-bold tracking-wider">ACCURACY</p>
                                <p class="text-3xl font-black text-purple-400" id="accuracyRate">0%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts and Events -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Events List -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Active Events -->
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-red-500/20 to-orange-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                            <div class="flex items-center space-x-4 pb-6 border-b border-white/10">
                                <div class="relative">
                                    <div class="absolute -inset-1 bg-gradient-to-r from-red-500/30 to-orange-500/30 rounded-xl blur-lg"></div>
                                    <div class="relative p-3 bg-gradient-to-br from-red-500/20 to-orange-500/20 rounded-xl border border-red-400/30 hover-lift">
                                        <i data-lucide="alert-triangle" class="w-6 h-6 text-red-400 floating"></i>
                                        <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-red-400 to-orange-400 rounded-full"></div>
                                    </div>
                                </div>
                                <h2 class="text-2xl font-bold tracking-tight">Active Events</h2>
                            </div>
                            <div class="space-y-4 mt-6" id="eventsList">
                                <!-- Events will be populated here -->
                            </div>
                        </div>
                    </div>

                    <!-- Analytics Chart -->
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-blue-500/20 to-purple-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                            <div class="flex items-center space-x-4 pb-6 border-b border-white/10">
                                <div class="relative">
                                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-500/30 to-purple-500/30 rounded-xl blur-lg"></div>
                                    <div class="relative p-3 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl border border-blue-400/30 hover-lift">
                                        <i data-lucide="bar-chart-2" class="w-6 h-6 text-blue-400 floating"></i>
                                        <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full"></div>
                                    </div>
                                </div>
                                <h2 class="text-2xl font-bold tracking-tight">Response Time Trends</h2>
                            </div>
                            <div class="mt-6">
                                <canvas id="responseChart" width="400" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Resources Status -->
                <div class="space-y-6">
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-green-500/20 to-emerald-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                            <div class="flex items-center space-x-4 pb-6 border-b border-white/10">
                                <div class="relative">
                                    <div class="absolute -inset-1 bg-gradient-to-r from-green-500/30 to-emerald-500/30 rounded-xl blur-lg"></div>
                                    <div class="relative p-3 bg-gradient-to-br from-green-500/20 to-emerald-500/20 rounded-xl border border-green-400/30 hover-lift">
                                        <i data-lucide="users" class="w-6 h-6 text-green-400 floating"></i>
                                        <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-green-400 to-emerald-400 rounded-full"></div>
                                    </div>
                                </div>
                                <h2 class="text-2xl font-bold tracking-tight">Resources</h2>
                            </div>
                            <div class="space-y-4 mt-6" id="resourcesList">
                                <!-- Resources will be populated here -->
                            </div>
                        </div>
                    </div>

                    <!-- System Health -->
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-purple-500/20 to-pink-500/20 rounded-2xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative glass-morphism rounded-2xl p-6 hover-lift">
                            <div class="flex items-center space-x-4 pb-6 border-b border-white/10">
                                <div class="relative">
                                    <div class="absolute -inset-1 bg-gradient-to-r from-purple-500/30 to-pink-500/30 rounded-xl blur-lg"></div>
                                    <div class="relative p-3 bg-gradient-to-br from-purple-500/20 to-pink-500/20 rounded-xl border border-purple-400/30 hover-lift">
                                        <i data-lucide="cpu" class="w-6 h-6 text-purple-400 floating"></i>
                                        <div class="absolute -bottom-1 left-1/2 right-1/2 h-1 bg-gradient-to-r from-purple-400 to-pink-400 rounded-full"></div>
                                    </div>
                                </div>
                                <h2 class="text-2xl font-bold tracking-tight">System Health</h2>
                            </div>
                            <div class="space-y-4 mt-6" id="systemHealth">
                                <!-- Health metrics will be populated here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // API endpoints
        const API_BASE = '/api';

        // Fetch and display data
        async function fetchDashboardData() {
            try {
                // Fetch metrics
                const metricsResponse = await fetch(`${API_BASE}/metrics`);
                const metrics = await metricsResponse.json();
                
                document.getElementById('totalEvents').textContent = metrics.total_events;
                document.getElementById('activeEvents').textContent = metrics.active_events;
                document.getElementById('resolvedEvents').textContent = metrics.resolved_events;
                document.getElementById('accuracyRate').textContent = `${metrics.accuracy_rate.toFixed(1)}%`;

                // Fetch events
                const eventsResponse = await fetch(`${API_BASE}/events`);
                const events = await eventsResponse.json();
                displayEvents(events);

                // Fetch resources
                const resourcesResponse = await fetch(`${API_BASE}/resources`);
                const resources = await resourcesResponse.json();
                displayResources(resources);

                // Fetch system health
                const healthResponse = await fetch(`${API_BASE}/system/health`);
                const health = await healthResponse.json();
                displaySystemHealth(health);

                // Fetch analytics for chart
                const analyticsResponse = await fetch(`${API_BASE}/analytics`);
                const analytics = await analyticsResponse.json();
                displayResponseChart(analytics.response_trends);

            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        }

        function displayEvents(events) {
            const eventsList = document.getElementById('eventsList');
            eventsList.innerHTML = '';

            events.forEach(event => {
                const severityClass = event.severity.toLowerCase();
                const eventCard = `
                    <div class="group relative">
                        <div class="absolute -inset-1 bg-gradient-to-r from-${severityClass}-500/20 to-${severityClass === 'critical' ? 'red' : severityClass === 'moderate' ? 'amber' : 'green'}-500/20 rounded-xl blur-lg opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative p-4 bg-gradient-to-r from-${severityClass}-500/10 to-${severityClass === 'critical' ? 'red' : severityClass === 'moderate' ? 'amber' : 'green'}-500/10 rounded-xl border border-${severityClass}-400/30 hover-lift">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h3 class="font-semibold text-white">${event.type}</h3>
                                    <p class="text-sm text-gray-300">${event.location}</p>
                                    <p class="text-xs text-gray-400 mt-1">${new Date(event.timestamp).toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <span class="px-3 py-1 ${severityClass} text-white text-xs font-semibold rounded-full">
                                        ${event.severity}
                                    </span>
                                    <p class="text-sm text-gray-300 mt-2">${event.confidence}%</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                eventsList.innerHTML += eventCard;
            });
        }

        function displayResources(resources) {
            const resourcesList = document.getElementById('resourcesList');
            resourcesList.innerHTML = '';

            resources.forEach(resource => {
                const statusColor = resource.status === 'Active' ? 'green' : resource.status === 'On Standby' ? 'amber' : 'gray';
                const resourceCard = `
                    <div class="group relative">
                        <div class="absolute -inset-1 bg-gradient-to-r from-${statusColor}-500/20 to-${statusColor}-500/20 rounded-xl blur-lg opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="relative p-4 bg-gradient-to-r from-${statusColor}-500/10 to-${statusColor}-500/10 rounded-xl border border-${statusColor}-400/30 hover-lift">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h3 class="font-semibold text-white">${resource.name}</h3>
                                    <p class="text-sm text-gray-300">${resource.type}</p>
                                    <p class="text-xs text-gray-400 mt-1">${resource.location}</p>
                                </div>
                                <div class="text-right">
                                    <span class="px-3 py-1 bg-${statusColor}-500 text-white text-xs font-semibold rounded-full">
                                        ${resource.status}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                resourcesList.innerHTML += resourceCard;
            });
        }

        function displaySystemHealth(health) {
            const healthList = document.getElementById('systemHealth');
            healthList.innerHTML = '';

            // Services status
            Object.entries(health.services).forEach(([service, status]) => {
                const statusColor = status === 'Healthy' ? 'green' : 'red';
                const healthItem = `
                    <div class="flex items-center justify-between p-3 bg-gradient-to-r from-gray-500/10 to-gray-500/10 rounded-xl border border-gray-400/30">
                        <span class="text-sm text-gray-300">${service.replace('_', ' ').toUpperCase()}</span>
                        <span class="px-2 py-1 bg-${statusColor}-500 text-white text-xs font-semibold rounded-full">
                            ${status}
                        </span>
                    </div>
                `;
                healthList.innerHTML += healthItem;
            });

            // Performance metrics
            Object.entries(health.performance).forEach(([metric, value]) => {
                const performanceItem = `
                    <div class="p-3 bg-gradient-to-r from-purple-500/10 to-purple-500/10 rounded-xl border border-purple-400/30">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-300">${metric.replace('_', ' ').toUpperCase()}</span>
                            <span class="text-sm font-semibold text-purple-400">${value.toFixed(1)}%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2 mt-2">
                            <div class="bg-purple-400 h-2 rounded-full" style="width: ${value}%"></div>
                        </div>
                    </div>
                `;
                healthList.innerHTML += performanceItem;
            });
        }

        function displayResponseChart(trends) {
            const ctx = document.getElementById('responseChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trends.map(t => t.date),
                    datasets: [{
                        label: 'Response Time (s)',
                        data: trends.map(t => t.avg_response_time),
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4
                    }, {
                        label: 'Events Count',
                        data: trends.map(t => t.events_count),
                        borderColor: 'rgb(16, 185, 129)',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        y: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        // Initialize dashboard
        fetchDashboardData();
        
        // Auto-refresh every 30 seconds
        setInterval(fetchDashboardData, 30000);
    </script>
</body>
</html>
